<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Duplex — Private Beta</title>
  <meta name="description" content="Book Duplex is currently in private beta. Invited users can sign in now, and new users can apply for access." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <style>
    /* ================================================================
       Reset & Base
       ================================================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a1a22;
      --bg-mid: #0f2b34;
      --text-main: #d8d8e4;
      --text-muted: rgba(216, 216, 228, 0.66);
      --text-subtle: rgba(216, 216, 228, 0.4);
      --line-soft: rgba(216, 216, 228, 0.14);
      --line-strong: rgba(216, 216, 228, 0.24);
      --teal: #4abfbf;
      --teal-bright: #6fd6d3;
      --coral: #e06b5b;
      --shadow-soft: 0 18px 60px rgba(0, 0, 0, 0.24);
    }

    html, body {
      min-height: 100%;
      overflow-x: hidden;
      font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont,
                   'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ================================================================
       Background — dark UI gradient + geometric shapes
       ================================================================ */
    body {
      background: linear-gradient(145deg, var(--bg-deep) 0%, var(--bg-mid) 50%, var(--bg-deep) 100%);
      color: var(--text-main);
      position: relative;
    }

    /* Geometric layer — soft brand-colored shapes at very low opacity */
    .geo-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .geo-bg svg {
      width: 100%;
      height: 100%;
    }

    /* Subtle animated drift */
    .geo-drift {
      animation: drift 50s ease-in-out infinite alternate;
      transform-origin: center center;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(-12px, 8px) scale(1.01); }
      100% { transform: translate(8px, -6px) scale(1); }
    }

    /* ================================================================
       Contact — upper-left
       ================================================================ */
    .contact-link {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: rgba(216, 216, 228, 0.54);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: color 0.3s ease;
    }

    .contact-link:hover {
      color: rgba(216, 216, 228, 0.85);
    }

    .contact-link svg {
      width: 16px;
      height: 16px;
      opacity: 0.6;
      transition: opacity 0.3s ease;
    }

    .contact-link:hover svg {
      opacity: 0.9;
    }

    .utility-actions {
      position: fixed;
      top: 22px;
      right: 28px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .utility-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      border: 1px solid rgba(216, 216, 228, 0.18);
      border-radius: 999px;
      background: rgba(10, 26, 34, 0.36);
      color: rgba(216, 216, 228, 0.92);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(18px);
      transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }

    .utility-link:hover {
      transform: translateY(-1px);
      border-color: rgba(216, 216, 228, 0.32);
      background: rgba(10, 26, 34, 0.56);
    }

    /* ================================================================
       Center content block
       ================================================================ */
    .center-block {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 104px 24px 48px;
      text-align: center;

      /* Fade-in on load */
      opacity: 0;
      animation: fadeIn 1.6s ease-out 0.2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .hero-shell {
      width: min(100%, 760px);
      padding: clamp(28px, 5vw, 44px);
      border: 1px solid rgba(216, 216, 228, 0.12);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%),
        rgba(7, 17, 22, 0.34);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(20px);
    }

    /* Logo */
    .logo-wrap {
      width: clamp(180px, 32vw, 360px);
      margin: 0 auto 24px;
    }

    .logo-wrap svg {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 4px 24px rgba(74, 191, 191, 0.12));
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      color: rgba(216, 216, 228, 0.7);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "";
      width: 30px;
      height: 1px;
      background: linear-gradient(90deg, rgba(216, 216, 228, 0), rgba(216, 216, 228, 0.28));
    }

    .eyebrow::after {
      background: linear-gradient(90deg, rgba(216, 216, 228, 0.28), rgba(216, 216, 228, 0));
    }

    .headline {
      max-width: 12ch;
      margin: 0 auto 16px;
      color: #f4f5fb;
      font-size: clamp(2.35rem, 7vw, 4.9rem);
      line-height: 0.96;
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    .subtitle {
      max-width: 33rem;
      margin: 0 auto;
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.65;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--text-muted);
    }

    .cta-group {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 0 24px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    }

    .cta:hover {
      transform: translateY(-1px);
    }

    .cta-primary {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(135deg, var(--teal-bright) 0%, var(--coral) 100%);
      color: #071116;
      box-shadow: 0 18px 34px rgba(74, 191, 191, 0.16);
    }

    .cta-primary:hover {
      box-shadow: 0 20px 42px rgba(224, 107, 91, 0.18);
    }

    .cta-secondary {
      border: 1px solid var(--line-strong);
      background: rgba(7, 17, 22, 0.32);
      color: #f1f2fa;
      backdrop-filter: blur(18px);
    }

    .cta-secondary:hover {
      border-color: rgba(216, 216, 228, 0.34);
      background: rgba(7, 17, 22, 0.48);
    }

    /* ================================================================
       Mobile adjustments
       ================================================================ */
    @media (max-width: 480px) {
      .contact-link {
        top: 16px;
        left: 16px;
        font-size: 12px;
      }

      .utility-actions {
        top: 14px;
        right: 16px;
        gap: 8px;
      }

      .utility-link {
        min-height: 38px;
        padding: 0 14px;
        font-size: 11px;
      }

      .center-block {
        padding: 92px 16px 24px;
      }

      .hero-shell {
        padding: 24px 20px;
        border-radius: 22px;
      }

      .logo-wrap {
        margin-bottom: 20px;
      }

      .headline {
        max-width: 10ch;
        margin-bottom: 14px;
        font-size: clamp(2rem, 13vw, 3.1rem);
      }

      .subtitle {
        font-size: 0.97rem;
        line-height: 1.58;
      }

      .cta-group {
        flex-direction: column;
      }

      .cta {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- ============================================================
       Geometric background layer
       ============================================================ -->
  <div class="geo-bg" aria-hidden="true">
    <svg class="geo-drift" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Brand gradients -->
        <linearGradient id="gPrimary" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6FD6D3"/>
          <stop offset="100%" stop-color="#FF5A4A"/>
        </linearGradient>
        <linearGradient id="gAccent" x1="0" y1="1" x2="1" y2="0">
          <stop offset="0%" stop-color="#5EDFD8"/>
          <stop offset="100%" stop-color="#F5A25C"/>
        </linearGradient>
        <linearGradient id="gTeal" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4ABFBF"/>
          <stop offset="100%" stop-color="#0A1A22"/>
        </linearGradient>
        <linearGradient id="gCoral" x1="1" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#E06B5B"/>
          <stop offset="100%" stop-color="#0F2B34"/>
        </linearGradient>
      </defs>

      <!-- Large soft diamond — top-right -->
      <rect x="850" y="-120" width="500" height="500"
            rx="6" transform="rotate(45 1100 130)"
            fill="url(#gPrimary)" opacity="0.035"/>

      <!-- Angled rectangle — left -->
      <rect x="-100" y="350" width="600" height="300"
            rx="4" transform="rotate(-20 200 500)"
            fill="url(#gAccent)" opacity="0.03"/>

      <!-- Thin chevron echo — center -->
      <polyline points="420,680 720,520 1020,680"
                stroke="url(#gPrimary)" stroke-width="1.5"
                fill="none" opacity="0.06"/>
      <polyline points="380,710 720,530 1060,710"
                stroke="url(#gAccent)" stroke-width="1"
                fill="none" opacity="0.04"/>

      <!-- Small tilted square — bottom-right -->
      <rect x="1100" y="600" width="200" height="200"
            rx="3" transform="rotate(30 1200 700)"
            fill="url(#gTeal)" opacity="0.04"/>

      <!-- Horizontal line grid — very subtle -->
      <line x1="0" y1="280" x2="1440" y2="280" stroke="#4ABFBF" stroke-width="0.5" opacity="0.04"/>
      <line x1="0" y1="620" x2="1440" y2="620" stroke="#E06B5B" stroke-width="0.5" opacity="0.04"/>

      <!-- Floating diamond — upper-left -->
      <rect x="80" y="60" width="140" height="140"
            rx="3" transform="rotate(45 150 130)"
            fill="url(#gCoral)" opacity="0.03"/>

      <!-- Subtle radial glow behind center content -->
      <circle cx="720" cy="420" r="320"
              fill="url(#gPrimary)" opacity="0.02"/>
    </svg>
  </div>

  <!-- ============================================================
       Contact — upper-left
       ============================================================ -->
  <a class="contact-link" href="mailto:info@bkdplx.com" aria-label="Contact us via email">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
         stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <path d="M22 4L12 13 2 4"/>
    </svg>
    Contact
  </a>

  <div class="utility-actions" aria-label="Authentication actions">
    <a class="utility-link" data-auth-login-link href="#" aria-label="Log in to Book Duplex">
      Login
    </a>
    <a class="utility-link" data-auth-signup-link href="#" aria-label="Sign up for Book Duplex">
      Sign Up
    </a>
  </div>

  <!-- ============================================================
       Center content
       ============================================================ -->
  <main class="center-block">
    <section class="hero-shell" aria-label="Private beta entry">
      <!-- BkDplx logo -->
      <div class="logo-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="BkDplx logo">
          <polyline points="52,100 200,16 348,100"
            stroke="#E06B5B" stroke-width="14"
            stroke-linecap="butt" stroke-linejoin="miter"
            fill="none"/>
          <text x="200" y="178" text-anchor="middle"
            font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
            font-weight="900" font-size="90">
            <tspan fill="#4ABFBF">Bk</tspan><tspan fill="#E06B5B">Dplx</tspan>
          </text>
        </svg>
      </div>

      <p class="eyebrow">Private Beta</p>
      <h1 class="headline">Entry is open by invite.</h1>
      <p class="subtitle">
        Book Duplex is currently in private beta. Invited users can sign in now.
        New users can apply for access.
      </p>

      <div class="cta-group">
        <a class="cta cta-primary" data-beta-apply-link href="#" target="_blank" rel="noreferrer noopener">Apply for Private Beta</a>
        <a class="cta cta-secondary" data-auth-login-link href="#">Login</a>
        <a class="cta cta-secondary" data-auth-signup-link href="#">Sign Up</a>
      </div>
    </section>
  </main>

  <script>
    const DEFAULT_AUTH_BASE_URL = "https://app.bkdplx.com";

    const DEFAULT_APPLY_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdVPJLck8aTsiHlH0FBmBSYnxWIsS_Cnk2WNa40wupNZ6kvnA/viewform?usp=header";

    const runtimeConfig = window.BKDPLX_LANDING_CONFIG || {};

    const pickConfigValue = (...values) => {
      const value = values.find((candidate) => typeof candidate === "string" && candidate.trim().length > 0);
      return value ? value.trim() : "";
    };

    const buildUrl = (target, fallbackBasePath) => {
      const cleanedTarget = pickConfigValue(target);

      if (!cleanedTarget) {
        return fallbackBasePath;
      }

      try {
        return new URL(cleanedTarget).toString();
      } catch (error) {
        return new URL(cleanedTarget, window.location.origin).toString();
      }
    };

    const authBaseUrl = pickConfigValue(
      runtimeConfig.authBaseUrl,
      document.documentElement.dataset.authBaseUrl,
      DEFAULT_AUTH_BASE_URL
    );

    const applyUrl = pickConfigValue(
      runtimeConfig.applyUrl,
      runtimeConfig.betaApplyUrl,
      document.documentElement.dataset.applyUrl,
      document.documentElement.dataset.betaApplyUrl,
      DEFAULT_APPLY_URL
    );

    const authLoginUrl = new URL("/auth/login", authBaseUrl).toString();
    const authSignupUrl = new URL("/auth/signup", authBaseUrl).toString();
    const resolvedApplyUrl = buildUrl(applyUrl, DEFAULT_APPLY_URL);

    document.querySelectorAll("[data-auth-login-link]").forEach((link) => {
      link.href = authLoginUrl;
    });

    document.querySelectorAll("[data-auth-signup-link]").forEach((link) => {
      link.href = authSignupUrl;
    });

    document.querySelectorAll("[data-beta-apply-link]").forEach((link) => {
      link.href = resolvedApplyUrl;
    });
  </script>

</body>
</html>
